{% extends 'billing/base.html' %}
{% block title %}Eliminar Cliente{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header card-header-danger"><span class="icon-text"><i data-lucide="triangle-alert" class="icon-sm"></i>Confirmar eliminación</span></div>
      <div class="card-body">
        <p>¿Está seguro de que desea eliminar a <strong>{{ object }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger"><i data-lucide="trash-2"></i>Sí, eliminar</button>
          <a href="{% url 'billing:customer_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
