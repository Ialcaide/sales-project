{% extends 'billing/base.html' %}
{% block title %}Eliminar Cliente{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow border-danger">
      <div class="card-header bg-danger text-white"><h4>Eliminar</h4></div>
      <div class="card-body">
        <p>¿Está seguro de que desea eliminar a <strong>{{ object }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Sí, eliminar</button>
          <a href="{% url 'billing:customer_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
