{% extends 'billing/base.html' %}
{% block title %}Rol{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header card-header-accent">Rol</div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Nombre del rol</label>
            {{ form.name }}
          </div>
          <div class="mb-3">
            <label class="form-label">Permisos</label>
            <input type="text" id="permission-filter" class="form-control mb-2" placeholder="Filtrar permisos...">
            <div class="scroll-box" id="permission-list">
              {{ form.permissions }}
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Guardar</button>
          <a href="{% url 'security:group_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('permission-filter').addEventListener('input', function() {
    const term = this.value.trim().toLowerCase();
    document.querySelectorAll('#permission-list li').forEach(function(li) {
      li.style.display = li.textContent.toLowerCase().includes(term) ? '' : 'none';
    });
  });
</script>
{% endblock %}
