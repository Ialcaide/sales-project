{% comment %}
Botón CTA reutilizable, bulletproof para email (tabla + <a> con padding, no
<button>). Uso:
  {% include "emails/partials/_button.html" with url=mi_url label="Confirmar" %}
  {% include "emails/partials/_button.html" with url=mi_url label="Cancelar" variante="secondary" %}
  {% include "emails/partials/_button.html" with url=mi_url label="No fui yo" variante="danger" %}
variante: "primary" (default, azul sólido) | "secondary" (blanco con borde) | "danger" (rojo sólido).
{% endcomment %}
<table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="margin: 22px auto;">
  <tr>
    <td align="center" bgcolor="{% if variante == 'secondary' %}#FFFFFF{% elif variante == 'danger' %}#EF4444{% else %}#2563EB{% endif %}"
        style="border-radius:12px;{% if variante == 'secondary' %} border:1.5px solid #E5E7EB;{% endif %}">
      <a href="{{ url }}" class="btn-primary email-btn-full" target="_blank"
         style="display:inline-block; padding:14px 34px; font-size:15px; font-weight:700;
                color:{% if variante == 'secondary' %}#111827{% else %}#FFFFFF{% endif %};
                font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
                border-radius:12px; text-align:center;">
        {{ label }}
      </a>
    </td>
  </tr>
</table>
