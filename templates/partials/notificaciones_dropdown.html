<div class="dropdown">
  <button type="button" class="header-icon-btn" id="notifDropdown" data-bs-toggle="dropdown" aria-expanded="false">
    <i data-lucide="bell"></i>
    {% if notificaciones_no_leidas %}
    <span class="header-badge-dot"></span>
    {% endif %}
  </button>
  <ul class="dropdown-menu dropdown-menu-end dropdown-menu-md" aria-labelledby="notifDropdown">
    <li class="dropdown-header">Notificaciones</li>
    {% for n in notificaciones_recientes %}
    <li>
      <form method="post" action="{% url 'notificaciones:notificacion_marcar_leida' n.pk %}">
        {% csrf_token %}
        <button type="submit" class="dropdown-item dropdown-item-wrap">
          <span class="dot dot-{{ n.nivel }}"></span>
          <span>
            {{ n.mensaje }}
            <br><small class="text-muted">{{ n.fecha|date:"d/m/Y H:i" }}</small>
          </span>
        </button>
      </form>
    </li>
    {% empty %}
    <li><span class="dropdown-item-text">Sin notificaciones nuevas</span></li>
    {% endfor %}
    <li><hr class="dropdown-divider"></li>
    <li><a class="dropdown-item dropdown-item-center" href="{% url 'notificaciones:notificacion_list' %}">Ver todas</a></li>
  </ul>
</div>
