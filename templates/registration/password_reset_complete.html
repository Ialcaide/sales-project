{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseña Actualizada — TecnoStock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-container">
        <i class="bi bi-check-circle-fill"></i>
      </div>
      <h4>¡Contraseña Actualizada!</h4>
      <p class="mb-0 opacity-75">Ya puedes iniciar sesión con tu nueva contraseña</p>
    </div>

    <div class="auth-body">
      <a href="{% url 'security:login' %}" class="btn-auth-custom" style="display:flex; text-decoration:none;">
        <i class="bi bi-box-arrow-in-right"></i>
        <span>Ir a Iniciar Sesión</span>
      </a>
    </div>
  </div>
</div>

</body>
</html>
