{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseña Actualizada — TecnoStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-container">
        <i data-lucide="check-circle"></i>
      </div>
      <h4>¡Contraseña Actualizada!</h4>
      <p class="mb-0 opacity-75">Ya puedes iniciar sesión con tu nueva contraseña</p>
    </div>

    <div class="auth-body">
      <a href="{% url 'security:login' %}" class="btn-auth-custom">
        <i data-lucide="log-in"></i>
        <span>Ir a Iniciar Sesión</span>
      </a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>document.addEventListener('DOMContentLoaded', function() { if (window.lucide) window.lucide.createIcons(); });</script>
</body>
</html>
